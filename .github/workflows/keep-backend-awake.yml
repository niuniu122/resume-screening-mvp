name: Keep Backend Awake

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::notice::BACKEND_URL is not configured. Skipping keepalive ping."
            exit 0
          fi
          echo "Pinging $BACKEND_URL/health ..."
          HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 30 "$BACKEND_URL/health" || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Backend is healthy."
          elif [ "$HTTP_STATUS" = "000" ]; then
            echo "::notice::Backend is unreachable (connection failed)."
          else
            echo "::warning::Backend returned HTTP $HTTP_STATUS."
          fi
