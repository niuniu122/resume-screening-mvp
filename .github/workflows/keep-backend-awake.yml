name: Keep Backend Awake

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::notice::BACKEND_URL is not configured. Skipping keepalive ping."
            exit 0
          fi
          echo "Pinging $BACKEND_URL/health ..."
          HTTP_STATUS=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" --max-time 45 --retry 2 --retry-delay 10 --retry-all-errors "$BACKEND_URL/health" || true)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Backend is healthy."
          else
            echo "::error::Backend health check failed with HTTP ${HTTP_STATUS:-000}."
            exit 1
          fi
