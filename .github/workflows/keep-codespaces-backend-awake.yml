name: Keep Codespaces Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          BACKEND_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL is not configured."
            exit 1
          fi
          curl --fail --silent --show-error "$BACKEND_URL/health"
